# ============================================================
# Distributed Job Scheduler Platform — Docker Compose
# ============================================================
# Usage:
#   Development:  docker-compose up
#   Scale workers: docker-compose up --scale worker=3
# ============================================================

networks:
  jobscheduler_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

services:
  # ============================================================
  # PostgreSQL 16 — Primary Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: jobscheduler_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobscheduler}
      POSTGRES_USER: ${POSTGRES_USER:-jobscheduler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobscheduler_secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - jobscheduler_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobscheduler} -d ${POSTGRES_DB:-jobscheduler}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c min_wal_size=1GB
        -c max_wal_size=4GB
        -c log_min_duration_statement=1000
        -c log_checkpoints=on
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================================
  # Redis 7 — Queue + Cache + PubSub
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: jobscheduler_redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:-redis_secret}
        --bind 0.0.0.0
        --loglevel notice
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - jobscheduler_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ============================================================
  # Backend API — Node.js / Express / TypeScript
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobscheduler_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobscheduler}:${POSTGRES_PASSWORD:-jobscheduler_secret}@postgres:5432/${POSTGRES_DB:-jobscheduler}?schema=public&connection_limit=10&pool_timeout=20
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_this_in_production_min_32_chars_a}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_in_production_min_32_chars_b}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      CORS_ORIGINS: http://localhost,http://localhost:80,http://localhost:5173,http://frontend
      LOG_LEVEL: info
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    ports:
      - "3000:3000"
    networks:
      - jobscheduler_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

  # ============================================================
  # Worker Service — BullMQ Job Processor
  # ============================================================
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobscheduler}:${POSTGRES_PASSWORD:-jobscheduler_secret}@postgres:5432/${POSTGRES_DB:-jobscheduler}?schema=public&connection_limit=5&pool_timeout=20
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      WORKER_QUEUES: ${WORKER_QUEUES:-default,email,payment,reports}
      HEARTBEAT_INTERVAL_MS: 10000
      LEASE_CHECK_INTERVAL_MS: 15000
      WORKER_STALE_THRESHOLD_MS: 30000
      ENABLE_LEASE_MANAGER: "true"
      ENABLE_SCHEDULER: "true"
      LOG_LEVEL: info
    networks:
      - jobscheduler_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    stop_grace_period: 60s

  # ============================================================
  # Frontend — React / Vite (Nginx Served)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: /
    container_name: jobscheduler_frontend
    restart: unless-stopped
    networks:
      - jobscheduler_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Nginx — Reverse Proxy + SSL Termination
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: jobscheduler_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    networks:
      - jobscheduler_network
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
